<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Desain Interior</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fcfbf6; /* Latar belakang off-white */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif; /* Font serif tebal untuk judul */
            font-size: 80px;
            color: #0c3b7a; /* Warna biru tua */
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1); /* Sedikit tekstur */
        }

        .header .underline {
            width: 150px;
            height: 3px;
            background-color: #ffcc00; /* Warna kuning */
            margin: 10px auto;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 kolom */
            gap: 20px;
        }

        .portfolio-item {
            background-color: #ffffff;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 4px;
        }

        .image-container {
            width: 100%;
            height: 250px; /* Tinggi seragam untuk gambar */
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Pastikan gambar memenuhi wadah */
            display: block;
        }

        .details-bar {
            background-color: #ffcc00; /* Warna kuning latar belakang tombol */
            padding: 15px 0;
            text-align: center;
            border-top: 1px solid #ddd;
        }

        .details-button {
            text-decoration: none;
            color: #000000;
            font-weight: bold;
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer;
        }

        /* Responsivitas untuk layar kecil */
        @media (max-width: 768px) {
            .portfolio-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header h1 {
                font-size: 50px;
            }
        }
    }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Portofolio</h1>
        <div class="underline"></div>
    </div>

    <div class="portfolio-grid">
        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/furniture_1.jpg" alt="Kursi oranye bertekstur dengan tanaman di samping jendela">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/sculpture_1.jpg" alt="Teko keramik bergaya dengan hiasan geometris hitam dan emas di atas nampan kayu">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/sculpture_2.jpg" alt="Vas keramik hitam memegang ranting daun di atas permukaan marmer">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/shelving_1.jpg" alt="Rak kayu mengambang dengan vas keramik bulat dan tanaman vas kecil">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/furniture_2.jpg" alt="Kursi oranye bertekstur dengan kaki kayu di samping tanaman pot kecil">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/shelving_2.jpg" alt="Rak mengambang kayu dengan vas bulat di samping wadah rotan silinder">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/shelving_3.jpg" alt="Vas tembikar bulat dan vas kecil dengan tanaman di rak mengambang">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/furniture_3.jpg" alt="Kursi berlapis oranye dengan detail rotan dan alas bundar di karpet">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/shelving_4.jpg" alt="Rak penyimpanan terbuka kayu di bawah lampu pendant hitam">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/furniture_4.jpg" alt="Kursi oranye berlapis dengan kaki logam tipis di samping rak kawat">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/furniture_5.jpg" alt="Sofa modern berlapis abu-abu gelap dengan bingkai kayu">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>

        <div class="portfolio-item">
            <div class="image-container">
                <img src="images/furniture_6.jpg" alt="Sofa berlapis abu-abu terang dengan meja kopi kayu berbentuk oval">
            </div>
            <div class="details-bar">
                <a href="#" class="details-button">Lihat Detail</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
