<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Produk - AW Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0; 
            padding: 0; 
            /* WARNA BIRU TUA SOLID, TIDAK HITAM */
            background-color: #0a2463; 
            font-family: Arial, sans-serif;
        }

        /* BACKGROUND GAMBAR DIATUR AGAR JELAS & KENTARA */
        .background-image {
            background-image: url('digital-printing.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* OPACITY DIATUR AGAR GAMBAR KENTARA TAPI BIRUNYA TETAP JELAS */
            background-blend-mode: soft-light;
        }

        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            padding-top: 50px; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.8); 
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80%;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: #bbb;
            text-decoration: none;
        }

        .item-box {
            width: 100%; 
            aspect-ratio: 1/1; 
            border: 3px solid #f3d278; 
            border-radius: 12px; 
            overflow: hidden; 
            position: relative; 
            background: white; 
            cursor: pointer;
        }

        .label-box {
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #f3d278; 
            color: #0a2463; 
            text-align: center; 
            padding: 6px 0; 
            font-weight: bold; 
            font-size: 14px;
        }
    </style>
</head>
<body class="background-image">

    <div class="min-h-screen flex flex-col">
        
        <!-- JUDUL -->
        <div class="py-6 px-4 text-center">
            <h1 style="font-size: clamp(2rem, 6vw, 3rem); color: #f3d278; font-weight: 900; line-height: 1.1;">Hasil Produk</h1>
            <p style="color: #f3d278; font-size: 1rem; max-width: 700px; margin: 20px auto 0 auto; line-height: 1.5;">
                Hasil produk cetakan kami untuk menunjang kebutuhan pameran.
            </p>
        </div>

        <!-- ISI KOTAK-KOTAK (DIBERI JARAK KIRI KANAN AGAR RAPI) -->
        <div class="flex-grow px-6 py-4">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 850px; margin: 0 auto;">

                <!-- BARIS 1 -->
                <div onclick="bukaFile('Majalah 01.jpg', 'gambar')" class="item-box">
                    <img src="Majalah 01.jpg" style="width: 100%; height: 100%; object-fit: cover;">

                        Lihat Detail <i class="fas fa-hand-point-right" style="margin-left: 8px;"></i>
                    </div>
                </div>

                <div onclick="bukaFile('Majalah 02.jpg', 'gambar')" class="item-box">

                        Lihat Detail <i class="fas fa-hand-point-right" style="margin-left: 8px;"></i>
                    </div>
                </div>

                <div onclick="bukaFile('Majalah 03.jpg', 'gambar')" class="item-box">
                    <img src="Majalah 03.jpg" style="width: 100%; height: 100%; object-fit: cover;">
                    <div class="label-box">
                        Lihat Detail <i class="fas fa-hand-point-right" style="margin-left: 8px;"></i>
                    </div>
                </div>

                <!-- BARIS 2 -->
                <div onclick="bukaFile('Majalah 04.jpg', 'gambar')" class="item-box">
                    <img src="Majalah 04.jpg" style="width: 100%; height: 100%; object-fit: cover;">
                    <div class="label-box">
                        Lihat Detail <i class="fas fa-hand-point-right" style="margin-left: 8px;"></i>
                    </div>
                </div>

                <div onclick="bukaFile('Banner 01.jpg', 'gambar')" class="item-box">
                    <img src="Banner 01.jpg" style="width: 100%; height: 100%; object-fit: cover;">
                    <div class="label-box">
                        Lihat Detail <i class="fas fa-hand-point-right" style="margin-left: 8px;"></i>
                    </div>
                </div>

                <div onclick="bukaFile('Banner 02.jpg', 'gambar')" class="item-box">
                    <img src="Banner 02.jpg" style="width: 100%; height: 100%; object-fit: cover;">
                    <div class="label-box">
                        Lihat Detail <i class="fas fa-hand-point-right" style="margin-left: 8px;"></i>
                    </div>
                </div>

                <!-- BARIS 3 -->
                <div onclick="bukaFile('Spanduk nama stand.jpg', 'gambar')" class="item-box">
                    <img src="Spanduk nama stand.jpg" style="width: 100%; height: 100%; object-fit: cover;">
                    <div class="label-box">

                <div onclick="bukaFile('Cetak Majalah 01.mp4', 'video')" class="item-box">
                    <video src="Cetak Majalah 01.mp4" controls style="width: 100%; height: 100%; object-fit: cover;"></video>
                    <div class="label-box">
                        Lihat Detail <i class="fas fa-hand-point-right" style="margin-left: 8px;"></i>
                    </div>
                </div>

                <div onclick="bukaFile('Cetak Majalah 02.mp4', 'video')" class="item-box">
                    <video src="Cetak Majalah 02.mp4" controls style="width: 100%; height: 100%; object-fit: cover;"></video>
                    <div class="label-box">
                        Lihat Detail <i class="fas fa-hand-point-right" style="margin-left: 8px;"></i>
                    </div>
                </div>

                <!-- BARIS 4 -->
                <div onclick="bukaFile('Backdrop 01.jpg', 'gambar')" class="item-box">
                    <img src="Backdrop 01.jpg" style="width: 100%; height: 100%; object-fit: cover;">

                <div onclick="bukaFile('Backdrop 02.jpg', 'gambar')" class="item-box">

            </div>
        </div>

        <!-- FOOTER -->
        <div class="py-4 text-center" style="color: #f3d278;">
            <p>Copyright © 2026 AW Solutions</p>
            <p>Jasa Tugas Diklat PKN, PKA, PKP</p>
        </div>

    </div>

    <!-- MODAL -->
    <div id="myModal" class="modal">
        <span class="close" onclick="tutupFile()">&times;</span>
        <div id="kontenModal" class="modal-content"></div>
    </div>

    <script>
        var modal = document.getElementById("myModal");
        var kontenModal = document.getElementById("kontenModal");

        function bukaFile(namaFile, tipe) {
            modal.style.display = "block";
            if(tipe == 'gambar') {
                kontenModal.innerHTML = '<img src="' + namaFile + '" style="max-width:100%; max-height:100%;">';
            } else if(tipe == 'video') {
                kontenModal.innerHTML = '<video src="' + namaFile + '" controls style="max-width:100%; max-height:100%;">';
            }
        }

        function tutupFile() {
            modal.style.display = "none";
            kontenModal.innerHTML = '';
        }
    </script>

</body>
</html>
