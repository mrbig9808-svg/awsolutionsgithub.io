<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - AW Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* WARNA BIRU TUA SESUAI HALAMAN LAIN */
        :root {
            --warna-biru: #001f3f;
        }

        /* BACKGROUND DENGAN LAPISAN BIRU TUA MERATA */
        .hero-section {
            background-image: url('Latar Mengetik 01.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--warna-biru);
            opacity: 0.9;
            z-index: 1;
        }

        /* Agar konten berada di atas lapisan warna */
        .content-wrapper {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* NAVBAR */
        .navbar {
            background-color: var(--warna-biru);
            padding: 15px 0;
            position: relative;
            z-index: 3;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .navbar a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar flex justify-center">
        <a href="#">Beranda</a>
        <a href="#">Layanan</a>
        <a href="#">Tentang Kami</a>
        <a href="#">Kontak</a>
    </div>

    <!-- HERO SECTION -->
    <div class="hero-section">
        <div class="content-wrapper">
            
            <p style="color: white; font-size: 1.2rem; margin-bottom: 10px;">pengetikan desain dan cetak</p>

            <h1 style="color: white; font-size: clamp(2.5rem, 8vw, 4rem); font-weight: bold; margin-bottom: 20px;">
                Jasa Tugas Diklat
            </h1>

            <p style="color: white; font-size: clamp(1rem, 3vw, 1.5rem); max-width: 800px; line-height: 1.6; margin-bottom: 40px;">
                PKN Pelatihan Kepemimpinan Nasional Tingkat II dan Tingkat I PKA Pelatihan Kepemimpinan Administrator PKP Pelatihan Kepemimpinan Pengawas
            </p>

            <!-- TULISAN DI ATAS TOMBOL, UKURAN KECIL -->
            <p style="color: white; font-size: 0.9rem; margin-bottom: 20px;">
                "Solusi Lengkap untuk Kebutuhan Tugas Diklat Anda"
            </p>

            <button style="background-color: white; color: var(--warna-biru); padding: 15px 30px; font-size: 1.5rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer;">
                Mulai Sekarang
            </button>

        </div>
    </div>

</body>
</html>
