<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Ultra&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #f9f9f7; /* Background putih tulang sedikit tekstur */
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Judul Portofolio */
        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .header h1 {
            font-family: 'Ultra', serif; /* Font tebal bergaya slab-serif */
            font-size: 8rem;
            color: #1a4a8d; /* Biru tua sesuai desain */
            margin: 0;
            text-transform: capitalize;
            letter-spacing: -2px;
            /* Efek tekstur sedikit kasar pada teks */
            -webkit-text-stroke: 1px #1a4a8d;
        }

        .header .divider {
            width: 100px;
            height: 6px;
            background-color: #d4a017; /* Garis emas/kuning tua */
            margin: 10px auto;
        }

        /* Grid Container */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 kolom horisontal */
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        /* Item Bingkai */
        .portfolio-item {
            background-color: #fcd116; /* Warna kuning latar belakang bingkai */
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
        }

        /* Area Foto */
        .photo-placeholder {
            width: 100%;
            aspect-ratio: 4 / 5; /* Proporsi vertikal sesuai desain */
            background-color: #eee;
            background-image: url('https://via.placeholder.com/400x500'); /* Ganti dengan URL gambar Anda */
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Label Lihat Detail */
        .detail-bar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 12px 5px 5px 5px;
            color: #0d2a54; /* Warna teks biru gelap */
        }

        .detail-bar i {
            font-size: 1.2rem;
            margin-right: 10px;
            /* Icon mata dengan lingkaran luar sesuai gambar */
            border: 2px solid #0d2a54;
            border-radius: 50%;
            padding: 4px;
            font-size: 0.8rem;
        }

        .detail-bar span {
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 992px) {
            .portfolio-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 5rem; }
        }

        @media (max-width: 600px) {
            .portfolio-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Portofolio</h1>
        <div class="divider"></div>
    </div>

    <div class="portfolio-grid">
        <script>
            // Script sederhana untuk mengulang item agar kode tidak terlalu panjang
            for (let i = 0; i < 12; i++) {
                document.write(`
                    <div class="portfolio-item">
                        <div class="photo-placeholder"></div>
                        <div class="detail-bar">
                            <i class="fa-solid fa-eye"></i>
                            <span>Lihat Detail</span>
                        </div>
                    </div>
                `);
            }
        </script>
    </div>

</body>
</html>
