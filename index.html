<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Produk</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .title {
            text-align: center;
            color: #0d47a1;
            font-size: 36px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .portfolio-item {
            border: 2px solid #ffcc00;
            border-radius: 4px;
            background-color: #fff;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .photo-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #ddd;
            margin-bottom: 10px;
            border-radius: 2px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .photo-placeholder img,
        .photo-placeholder video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-button {
            background-color: #ffcc00;
            color: #000;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 5px;
            box-sizing: border-box;
            cursor: pointer;
            border: none;
        }

        .eye-icon {
            width: 18px;
            height: 18px;
            margin-right: 5px;
        }

        footer {
            background-color: #0d47a1;
            color: #ffcc00;
            text-align: center;
            padding: 12px 0;
            width: 100%;
            box-sizing: border-box;
        }

        footer p {
            margin: 0;
            font-size: 13px;
        }

        /* STYLE POPUP */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            position: relative;
            max-width: 90%;
            text-align: center;
        }

        .modal-content img,
        .modal-content video {
            max-width: 100%;
            max-height: 70vh;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .caption {
            color: #0d47a1;
            font-size: 16px;
            font-weight: bold;
        }

        .close-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 35px;
            height: 35px;
            background-color: #ffcc00;
            color: #0d47a1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #0d47a1;
        }
    </style>
</head>

    <footer>

    <!-- MODAL POPUP -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalMedia"></div>
            <div id="modalCaption" class="caption"></div>
        </div>
    </div>

    <script>
        function openModal(src, caption) {
            document.getElementById("myModal").style.display = "flex";
            document.getElementById("modalCaption").innerHTML = caption;
            
            // Cek apakah itu video atau gambar
            if(src.includes('.mp4') || src.includes('.webm')) {
                document.getElementById("modalMedia").innerHTML = '<video controls src="'+src+'"></video>';
            } else {
                document.getElementById("modalMedia").innerHTML = '<img src="'+src+'" alt="Detail">';
            }
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
            document.getElementById("modalMedia").innerHTML = '';
        }

        window.onclick = function(event) {
            var modal = document.getElementById("myModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
